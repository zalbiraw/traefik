---
kind: EndpointSlice
apiVersion: discovery.k8s.io/v1
metadata:
  name: whoami1-abc
  namespace: default
  labels:
    kubernetes.io/service-name: whoami1

addressType: IPv4
ports:
  - name: web
    port: 8080
endpoints:
  - addresses:
      - 10.10.0.1
      - 10.10.0.2
    conditions:
      ready: true

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix
  namespace: default

spec:
  stripPrefix:
    prefixes:
      - /tobestripped

---
apiVersion: v1
kind: Service
metadata:
  name: whoami1
  namespace: default

spec:
  ports:
    - name: web
      port: 8080
  selector:
    app: traefiklabs
    task: whoami1

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: wrr-inner
  namespace: default

spec:
  weighted:
    services:
      - name: whoami1
        port: 8080

---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: hrw-outer
  namespace: default

spec:
  highestRandomWeight:
    services:
      - kind: TraefikService
        name: wrr-inner
        weight: 1
        middlewares:
          - name: stripprefix

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: test.route
  namespace: default

spec:
  entryPoints:
    - web

  routes:
    - match: Host(`foo.com`) && PathPrefix(`/foo`)
      kind: Rule
      priority: 12
      services:
        - name: hrw-outer
          kind: TraefikService
